server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressao agressiva
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
      text/plain text/css text/javascript text/xml
      application/javascript application/json application/xml application/wasm
      application/octet-stream
      font/woff2;

    # Cache longo pros assets versionados (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache moderado pro parquet (atualizado pelo pipeline diario)
    location /data/ {
        expires 6h;
        add_header Cache-Control "public, max-age=21600";
        # MIME corretos
        types {
            application/vnd.apache.parquet parquet;
            application/octet-stream parquet;
        }
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Headers de seguranca
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
